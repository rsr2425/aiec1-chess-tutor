services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  chess-engine-server:
    build:
      context: ./src/chess-engine-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ENABLE_MAIA=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend-test:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    depends_on:
      qdrant:
        condition: service_healthy
      chess-engine-server:
        condition: service_healthy
    environment:
      - ENGINE_SERVICE_URL=http://chess-engine-server:8001
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - LANGSMITH_TRACING=false
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY}
      - AI_GATEWAY_BASE_URL=${AI_GATEWAY_BASE_URL}
      - CHAT_MODEL=${CHAT_MODEL:-openai/gpt-4.1-mini}
      - DISTILL_MODEL=${DISTILL_MODEL:-openai/gpt-4.1-mini}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
    command: ["uv", "run", "pytest", "tests/integration/", "-v", "--tb=short"]

  engine-test:
    build:
      context: ./src/chess-engine-server
      dockerfile: Dockerfile
    depends_on:
      chess-engine-server:
        condition: service_healthy
    environment:
      - ENGINE_SERVICE_URL=http://chess-engine-server:8001
      - ENABLE_MAIA=false
    command: ["uv", "run", "pytest", "tests/integration/", "-v", "--tb=short"]
