services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  chess-engine-server:
    build:
      context: ./src/chess-engine-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ENABLE_MAIA=${ENABLE_MAIA:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      chess-engine-server:
        condition: service_healthy
    environment:
      - ENGINE_SERVICE_URL=http://chess-engine-server:8001
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_TRACING=true
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-chess-tutor-local}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY}
      - AI_GATEWAY_BASE_URL=${AI_GATEWAY_BASE_URL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - CHAT_MODEL=${CHAT_MODEL:-openai/gpt-4.1-mini}
      - DISTILL_MODEL=${DISTILL_MODEL:-openai/gpt-4.1-mini}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - APP_NAME=${APP_NAME:-Blunderstanding}
      - ENGINE_SERVICE_TOKEN=${ENGINE_SERVICE_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - LANGGRAPH_API_URL=http://backend:8000
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-Blunderstanding}

volumes:
  qdrant_storage:
